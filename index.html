<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center | Charvin Kale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --accent-glow: #dc2626; /* Default Yumeko Red */
        }

        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #000000; 
            transition: background-color 0.5s ease;
        }

        /* YUMEKO STYLE (Default) */
        .glass-card {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(220, 38, 38, 0.15);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .text-accent { color: #dc2626; transition: color 0.5s; }
        .bg-accent { background-color: #dc2626; transition: background-color 0.5s; }
        .name-glow { text-shadow: 0 0 15px rgba(220, 38, 38, 0.6); transition: text-shadow 0.5s; }

        /* HOVER STATES FOR CARDS */
        .glass-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--accent-glow);
            box-shadow: 0 10px 40px -10px var(--accent-glow);
        }
        
        .card-btn {
            display: inline-block; margin-top: 1rem; padding: 8px 20px; border-radius: 8px;
            font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em;
            border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s ease;
        }
        .glass-card:hover .card-btn {
            background-color: var(--accent-glow);
            color: white;
            border-color: var(--accent-glow);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* TECH STACK MARQUEE */
        .marquee {
            display: flex; overflow: hidden; user-select: none; gap: 4rem;
            mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
            padding: 20px 0;
        }
        .marquee-content {
            display: flex; flex-shrink: 0; align-items: center; justify-content: space-around;
            gap: 5rem; min-width: 100%; animation: scroll 25s linear infinite;
        }
        
        .tech-icon { 
            font-size: 3.5rem; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            opacity: 0.9;
            filter: drop-shadow(0 0 8px var(--accent-glow));
        }
        .tech-icon:hover { 
            opacity: 1; 
            transform: scale(1.3) translateY(-10px);
            filter: drop-shadow(0 0 20px var(--accent-glow));
        }

        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-100%); } }

        /* GOJO MODE OVERRIDES */
        body.gojo-mode { --accent-glow: #3b82f6; }
        body.gojo-mode .glass-card { border-color: rgba(59, 130, 246, 0.2); }
        body.gojo-mode .text-accent { color: #3b82f6; }
        body.gojo-mode .bg-accent { background-color: #3b82f6; }
        body.gojo-mode .name-glow { text-shadow: 0 0 15px rgba(59, 130, 246, 0.8); }

        /* VIDEO BG */
        .video-bg {
            position: fixed; top: 50%; left: 50%; min-width: 100%; min-height: 100%;
            z-index: -100; transform: translateX(-50%) translateY(-50%); object-fit: cover;
        }

        #mobile-video { display: block; }
        #desktop-video { display: none; }
        @media (min-width: 768px) { #mobile-video { display: none; } #desktop-video { display: block; } }

        .mode-toggle {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 50%; cursor: pointer;
        }
    </style>
</head>
<body class="min-h-screen text-white overflow-x-hidden">

        </div>
    </div>

    <script>
        lucide.createIcons();

        function toggleDomain() {
            const body = document.body;
            const overlay = document.getElementById('overlay');
            const vidMobile = document.getElementById('mobile-video');
            const vidDesktop = document.getElementById('desktop-video');
            const srcMobile = document.getElementById('src-mobile');
            const srcDesktop = document.getElementById('src-desktop');

            body.classList.toggle('gojo-mode');

            if (body.classList.contains('gojo-mode')) {
                srcMobile.src = "gojo2.mp4";
                srcDesktop.src = "gojo1.mp4";
                overlay.classList.replace('to-red-950/40', 'to-blue-950/40');
                localStorage.setItem('domainMode', 'gojo');
            } else {
                srcMobile.src = "girl1.mp4";
                srcDesktop.src = "girl2.mp4";
                overlay.classList.replace('to-blue-950/40', 'to-red-950/40');
                localStorage.setItem('domainMode', 'yumeko');
            }
            vidMobile.load(); vidDesktop.load();
        }

        // Apply saved mode on load
        window.onload = () => {
            if (localStorage.getItem('domainMode') === 'gojo') {
                document.body.classList.add('gojo-mode');
                document.getElementById('src-mobile').src = "gojo2.mp4";
                document.getElementById('src-desktop').src = "gojo1.mp4";
                document.getElementById('overlay').classList.replace('to-red-950/40', 'to-blue-950/40');
                document.getElementById('mobile-video').load();
                document.getElementById('desktop-video').load();
            }
        };
    </script>
